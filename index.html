<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الاحترافية - إدارة المتجر</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        body { background: #f4f6f9; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #1e293b; color: white; padding: 25px 15px; }
        .sidebar h2 { font-size: 1.5rem; text-align: center; margin-bottom: 30px; color: #38bdf8; font-weight: 700; }
        .sidebar a { display: block; padding: 12px 15px; color: #cbd5e1; text-decoration: none; border-radius: 8px; margin-bottom: 10px; font-weight: 500; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #0f172a; color: #38bdf8; }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { color: #1e293b; font-size: 2rem; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .stat-card h3 { color: #64748b; font-size: 0.9rem; margin-bottom: 5px; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; color: #1e293b; }
        .stat-icon { font-size: 2.5rem; opacity: 0.2; }

        /* Form Card & Table */
        .grid-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .card h2 { font-size: 1.2rem; color: #1e293b; margin-bottom: 20px; border-left: 4px solid #38bdf8; padding-left: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }
        
        button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.95rem; }
        button:hover { background: #0369a1; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: right; }
        th { background: #f8fafc; padding: 14px; font-size: 0.85rem; color: #64748b; font-weight: 600; border-bottom: 2px solid #edf2f7; }
        td { padding: 14px; border-bottom: 1px solid #edf2f7; font-size: 0.9rem; color: #334155; vertical-align: middle; }
        .prod-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
        .badge-stock { background: #dcfce7; color: #15803d; }
        .badge-out { background: #fee2e2; color: #b91c1c; }
        
        .actions-btn { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; width: auto; }
        .btn-danger { background: #ef4444; } .btn-danger:hover { background: #dc2626; }
        .btn-edit { background: #f59e0b; } .btn-edit:hover { background: #d97706; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Wahz Store Pro</h2>
        <a href="/" class="active">📦 إدارة المنتجات</a>
        <a href="/admin-orders">🧾 الطلبات الواردة</a>
        <a href="/shop" target="_blank">🌐 عرض المتجر للمشترين</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>لوحة القيادة والمخزون</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div><h3>إجمالي المنتجات</h3><p id="totalProductsCount">0</p></div>
                <div class="stat-icon">📦</div>
            </div>
            <div class="stat-card">
                <div><h3>منتجات نفدت</h3><p id="outOfStockCount" style="color: #ef4444;">0</p></div>
                <div class="stat-icon">⚠️</div>
            </div>
            <div class="stat-card">
                <div><h3>نظام البيع</h3><p style="color: #10b981;">نشط الآن</p></div>
                <div class="stat-icon">⚡</div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <h2 id="formTitle">إضافة منتج جديد</h2>
                <form id="productForm" onsubmit="saveProduct(event)">
                    <input type="hidden" id="productId">
                    <div class="form-group"><label>اسم المنتج</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>القسم</label>
                        <select id="category">
                            <option value="ملابس">ملابس</option>
                            <option value="إلكترونيات">إلكترونيات</option>
                            <option value="أحذية">أحذية</option>
                            <option value="عام">عام أخرى</option>
                        </select>
                    </div>
                    <div class="form-group"><label>السعر (جنيه)</label><input type="number" id="price" step="0.01" required></div>
                    <div class="form-group"><label>الكمية بالمخزن</label><input type="number" id="stock" required></div>
                    <div class="form-group"><label>الوصف</label><textarea id="description" rows="3"></textarea></div>
                    <div class="form-group"><label>صورة المنتج</label><input type="file" id="image" accept="image/*"></div>
                    <button type="submit" id="submitBtn">حفظ المنتج في النظام</button>
                    <button type="button" id="cancelEditBtn" style="background:#64748b; margin-top:5px; display:none;" onclick="resetForm()">إلغاء التعديل</button>
                </form>
            </div>

            <div class="card" style="overflow-x: auto;">
                <h2>كل المعروضات بالمخزن</h2>
                <table>
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>القسم</th>
                            <th>السعر</th>
                            <th>المخزون</th>
                            <th>التحكم</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let editMode = false;

        async function fetchDashboardData() {
            const res = await fetch('/products');
            const products = await res.json();
            
            document.getElementById('totalProductsCount').innerText = products.length;
            document.getElementById('outOfStockCount').innerText = products.filter(p => p.stock <= 0).length;

            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img class="prod-img" src="${p.imageUrl || 'https://via.placeholder.com/50'}" /></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.category}</td>
                    <td style="font-weight:bold; color:#0284c7">${p.price} ج</td>
                    <td>${p.stock > 0 ? `<span class="badge badge-stock">متاح (${p.stock})</span>` : `<span class="badge badge-out">نفد</span>`}</td>
                    <td class="actions-btn">
                        <button class="btn-sm btn-edit" onclick="setEditProduct('${p.id}', '${p.name}', '${p.category}', ${p.price}, ${p.stock}, '${p.description || ''}')">تعديل</button>
                        <button class="btn-sm btn-danger" onclick="deleteProduct('${p.id}')">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveProduct(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('stock', document.getElementById('stock').value);
            formData.append('description', document.getElementById('description').value);
            
            const imgFile = document.getElementById('image').files[0];
            if(imgFile) formData.append('image', imgFile);

            let url = '/add';
            let method = 'POST';

            if(editMode) {
                const id = document.getElementById('productId').value;
                url = `/update/${id}`;
                method = 'PUT';
            }

            const res = await fetch(url, { method: method, body: formData });
            if(res.ok) {
                alert(editMode ? "تم تعديل بيانات المنتج بنجاح!" : "تم إضافة المنتج الجديد بنجاح!");
                resetForm();
                fetchDashboardData();
            }
        }

        function setEditProduct(id, name, category, price, stock, desc) {
            editMode = true;
            document.getElementById('formTitle').innerText = "تعديل بيانات المنتج 📝";
            document.getElementById('submitBtn').innerText = "حفظ التغييرات الجديدة";
            document.getElementById('cancelEditBtn').style.display = "block";
            
            document.getElementById('productId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('category').value = category;
            document.getElementById('price').value = price;
            document.getElementById('stock').value = stock;
            document.getElementById('description').value = desc;
        }

        function resetForm() {
            editMode = false;
            document.getElementById('productForm').reset();
            document.getElementById('formTitle').innerText = "إضافة منتج جديد";
            document.getElementById('submitBtn').innerText = "حفظ المنتج في النظام";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        async function deleteProduct(id) {
            if(confirm('هل أنت متأكد من مسح هذا المنتج نهائياً من السيستم؟')) {
                await fetch(`/delete/${id}`, { method: 'DELETE' });
                fetchDashboardData();
            }
        }

        fetchDashboardData();
    </script>
</body>
</html>

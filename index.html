<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahz Store - لوحة تحكم الإدارة</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --danger-color: #dc2626;
            --success-color: #16a34a;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: var(--primary-color);
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            background: var(--text-color);
            padding: 8px 15px;
            border-radius: 5px;
            margin-right: 10px;
            font-size: 14px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }

        .btn-cancel {
            background-color: #6b7280;
            margin-top: 10px;
        }
        
        .btn-cancel:hover { background-color: #4b5563; }

        .btn-delete { background-color: var(--danger-color); padding: 5px 10px; font-size: 12px; border: none; color: white; border-radius: 3px; cursor: pointer; }
        .btn-edit { background-color: #f59e0b; padding: 5px 10px; font-size: 12px; border: none; color: white; border-radius: 3px; cursor: pointer; margin-bottom: 5px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            text-align: right;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        th { background-color: #f9fafb; }

        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }

        .toast {
            min-width: 250px;
            margin-top: 10px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success { background-color: var(--success-color); }
        .toast.error { background-color: var(--danger-color); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Wahz Store - الإدارة</h1>
        <div class="nav-links">
            <a href="/shop">🛒 عرض المتجر</a>
            <a href="/admin-orders">📦 إدارة الطلبات</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 id="formTitle">إضافة منتج جديد</h2>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label>اسم المنتج</label>
                    <input type="text" id="name" required placeholder="مثال: تيشرت أوفر سايز">
                </div>

                <div class="form-group">
                    <label>القسم</label>
                    <input type="text" id="category" placeholder="مثال: ملابس رجالي" required>
                </div>

                <div class="form-group">
                    <label>السعر (جنية)</label>
                    <input type="number" id="price" required placeholder="0">
                </div>

                <div class="form-group">
                    <label>الكمية المتاحة في المخزن</label>
                    <input type="number" id="stock" required placeholder="0">
                </div>

                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="description" rows="3" placeholder="وصف تفصيلي للمنتج..."></textarea>
                </div>

                <div class="form-group">
                    <label>صورة المنتج</label>
                    <input type="file" id="image" accept="image/*">
                </div>

                <button type="submit" id="submitBtn">حفظ المنتج وتحديث النظام</button>
                <button type="button" id="cancelBtn" class="btn-cancel" style="display: none;" onclick="resetForm()">إلغاء التعديل</button>
            </form>
        </div>

        <div class="card">
            <h2>المنتجات الحالية</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>السعر</th>
                            <th>المخزن</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr><td colspan="5" style="text-align: center;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        let editMode = false;
        let currentProducts = [];
        const authHeaderValue = 'Basic ' + btoa('yousef_wahz:yoyomyom12');

        function triggerNotification(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function fetchDashboardData() {
            try {
                const res = await fetch('/products');
                if (!res.ok) throw new Error("فشل في جلب البيانات");
                currentProducts = await res.json();
                renderTable();
            } catch (error) {
                triggerNotification("خطأ في الاتصال بقاعدة البيانات لجلب المنتجات", "error");
            }
        }

        function renderTable() {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';

            if (currentProducts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا توجد منتجات حالياً. أضف منتجك الأول!</td></tr>';
                return;
            }

            currentProducts.forEach(product => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${product.imageUrl || 'https://via.placeholder.com/50'}" class="product-img" alt="Product"></td>
                    <td>${product.name}</td>
                    <td>${product.price} ج.م</td>
                    <td>${product.stock}</td>
                    <td>
                        <button class="btn-edit" onclick="editProduct('${product.id}')">✏️ تعديل</button>
                        <button class="btn-delete" onclick="deleteProduct('${product.id}')">🗑️ حذف</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function saveProduct(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري الاتصال بقاعدة البيانات...";

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('stock', document.getElementById('stock').value);
            formData.append('description', document.getElementById('description').value);
            
            const imgFile = document.getElementById('image').files[0];
            if(imgFile) formData.append('image', imgFile);

            let url = '/add';
            let method = 'POST';

            if(editMode) {
                const id = document.getElementById('productId').value;
                url = `/update/${id}`;
                method = 'PUT';
            }

            const myHeaders = new Headers();
            myHeaders.append('Authorization', authHeaderValue);

            try {
                const res = await fetch(url, { method: method, body: formData, headers: myHeaders });
                const resultData = await res.json().catch(() => ({}));

                if(res.ok) {
                    triggerNotification(editMode ? "تم تحديث بيانات المنتج بنجاح!" : "تم تسجيل المنتج في المتجر بنجاح!");
                    resetForm();
                    await fetchDashboardData();
                } else {
                    const errorMessage = resultData.details || resultData.error || "خطأ غير معروف في السيرفر";
                    triggerNotification(`فشلت العملية: ${errorMessage}`, "error");
                }
            } catch (err) {
                triggerNotification("خطأ شبكة: تأكد من اتصالك بالإنترنت", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = editMode ? "تأكيد وتحديث البيانات" : "حفظ المنتج وتحديث النظام";
            }
        }

        function editProduct(id) {
            const product = currentProducts.find(p => p.id == id);
            if (!product) return;

            document.getElementById('productId').value = product.id;
            document.getElementById('name').value = product.name;
            document.getElementById('category').value = product.category || '';
            document.getElementById('price').value = product.price;
            document.getElementById('stock').value = product.stock;
            document.getElementById('description').value = product.description || '';
            
            document.getElementById('formTitle').innerText = "تعديل بيانات المنتج";
            document.getElementById('submitBtn').innerText = "تأكيد وتحديث البيانات";
            document.getElementById('cancelBtn').style.display = "block";
            
            editMode = true;
            window.scrollTo(0, 0);
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').innerText = "إضافة منتج جديد";
            document.getElementById('submitBtn').innerText = "حفظ المنتج وتحديث النظام";
            document.getElementById('cancelBtn').style.display = "none";
            editMode = false;
        }

        async function deleteProduct(id) {
            if (!confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) return;

            const myHeaders = new Headers();
            myHeaders.append('Authorization', authHeaderValue);

            try {
                const res = await fetch(`/delete/${id}`, { method: 'DELETE', headers: myHeaders });
                if (res.ok) {
                    triggerNotification("تم حذف المنتج بنجاح");
                    await fetchDashboardData();
                } else {
                    const resultData = await res.json().catch(() => ({}));
                    triggerNotification(`فشل الحذف: ${resultData.error || ''}`, "error");
                }
            } catch (err) {
                triggerNotification("حدث خطأ أثناء الاتصال بالسيرفر للحذف", "error");
            }
        }

        window.onload = () => { fetchDashboardData(); };
    </script>
</body>
</html>
